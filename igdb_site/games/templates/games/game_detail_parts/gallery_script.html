<script>
    console.log('🎯 GALLERY SCRIPT LOADED');

    let galleryInitialized = false;
    let modalInstance = null;
    let galleryImages = [];
    let currentImageIndex = 0;

    // АДАПТИВНЫЕ РАЗМЕРЫ (УВЕЛИЧИЛИ)
    const FIXED_HEIGHT = 220;         // Увеличил с 180 до 220
    const MIN_WIDTH = 300;            // Увеличил минимальную ширину
    const MAX_SCALE = 1.8;           // Увеличил максимальное увеличение
    const ASPECT_RATIO = 16/9;       // Соотношение сторон (16:9)

    // Основная функция инициализации галереи
    window.initInlineGallery = function() {
        console.log('🚀 initInlineGallery() called');

        // Очищаем предыдущие данные
        galleryImages = [];

        // 1. Находим ВСЕ изображения галереи на странице
        galleryImages = Array.from(document.querySelectorAll('img[data-image]'));

        console.log(`📸 Found ${galleryImages.length} gallery images total on page`);

        if (galleryImages.length === 0) {
            console.warn('⚠️ No gallery images found');
            return;
        }

        // 2. УСТАНАВЛИВАЕМ РАЗМЕРЫ ДЛЯ ВСЕХ СКРИНШОТОВ (БЕЗ РАМОК)
        setScreenshotSizesNoBorders();

        // 3. Устанавливаем общее количество в счетчик
        const totalCountEl = document.getElementById('totalCount');
        if (totalCountEl) {
            totalCountEl.textContent = ` / ${galleryImages.length}`;
        }

        // 4. Настраиваем обработчики кликов
        galleryImages.forEach((img, index) => {
            // Удаляем старые обработчики
            img.removeEventListener('click', handleImageClick);

            // Добавляем новый обработчик
            img.addEventListener('click', handleImageClick);

            // Делаем изображение кликабельным
            img.style.cursor = 'pointer';
            img.style.transition = 'all 0.3s ease';

            // Сохраняем индекс в data-атрибуте
            img.setAttribute('data-gallery-index', index);
        });

        // 5. Инициализируем модальное окно если еще не инициализировано
        initModal();

        galleryInitialized = true;
        console.log(`✅ Gallery initialized with ${galleryImages.length} images`);
    };

    // Функция для установки размеров БЕЗ РАМОК
    function setScreenshotSizesNoBorders() {
        console.log(`🎯 Setting screenshot sizes (no borders)`);

        galleryImages.forEach((img, index) => {
            // Добавляем базовый CSS класс
            img.classList.add('screenshot-image-fixed');

            // Создаем или находим контейнер
            let container = img.closest('.screenshot-container-fixed');
            if (!container) {
                container = document.createElement('div');
                container.className = 'screenshot-container-fixed';
                img.parentNode.insertBefore(container, img);
                container.appendChild(img);
            }

            // Настройка контейнера (БЕЗ ФОНА для рамок)
            container.style.width = '100%';
            container.style.height = `${FIXED_HEIGHT}px`;
            container.style.overflow = 'hidden';
            container.style.position = 'relative';
            container.style.borderRadius = '8px';
            container.style.display = 'flex';
            container.style.alignItems = 'center';
            container.style.justifyContent = 'center';
            container.style.backgroundColor = 'transparent'; // Убрали фон

            // Если изображение уже загружено
            if (img.complete) {
                calculateAndSetImageSizeNoBorder(img, container);
            } else {
                // Ждем загрузки изображения
                img.addEventListener('load', function() {
                    calculateAndSetImageSizeNoBorder(this, container);
                });

                // Если ошибка загрузки
                img.addEventListener('error', function() {
                    handleImageErrorNoBorder(this, container);
                });
            }
        });
    }

    // Расчет и установка размера изображения БЕЗ РАМОК
    function calculateAndSetImageSizeNoBorder(img, container) {
        const originalWidth = img.naturalWidth;
        const originalHeight = img.naturalHeight;
        const originalRatio = originalWidth / originalHeight;

        console.log(`📐 Image: ${originalWidth}x${originalHeight}, ratio: ${originalRatio.toFixed(2)}`);

        // Проверяем, нужно ли увеличивать изображение
        if (originalWidth < MIN_WIDTH) {
            console.log(`📈 Small image detected, enlarging: ${originalWidth}x${originalHeight}`);

            // Рассчитываем коэффициент увеличения для достижения минимальной ширины
            const scaleFactor = Math.min(MAX_SCALE, MIN_WIDTH / originalWidth);
            const targetWidth = originalWidth * scaleFactor;
            const targetHeight = originalHeight * scaleFactor;

            // Устанавливаем увеличенные размеры (БЕЗ РАМОК)
            img.style.width = `${targetWidth}px`;
            img.style.height = `${targetHeight}px`;
            img.style.objectFit = 'scale-down';
            // УБРАЛИ: img.style.backgroundColor = '#2a2a2a';
            // УБРАЛИ: img.style.padding = '10px';
            // УБРАЛИ: img.style.border = '1px solid rgba(255, 107, 53, 0.3)';

            // Если изображение очень маленькое, увеличиваем больше
            if (originalWidth < 200) {
                const extraScale = 2.2;
                img.style.transform = `scale(${extraScale})`;
                img.style.transformOrigin = 'center center';
            }

        } else {
            // Изображение нормального размера - подгоняем под контейнер
            if (originalRatio > ASPECT_RATIO) {
                // Широкое изображение (шире 16:9)
                img.style.width = '100%';
                img.style.height = 'auto';
                img.style.objectFit = 'cover';
            } else {
                // Высокое или квадратное изображение
                img.style.width = 'auto';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
            }
        }

        // Центрируем изображение
        img.style.display = 'block';
        img.style.margin = 'auto';

        // УБРАЛИ информацию о размере
        // addSizeInfo(img, container, originalWidth, originalHeight);
    }

    // Обработка ошибки загрузки изображения БЕЗ РАМОК
    function handleImageErrorNoBorder(img, container) {
        console.error('❌ Failed to load image');

        img.style.width = '100%';
        img.style.height = `${FIXED_HEIGHT}px`;
        img.style.backgroundColor = '#2a2a2a'; // Оставляем только для ошибок
        img.style.display = 'flex';
        img.style.alignItems = 'center';
        img.style.justifyContent = 'center';
        img.style.color = '#dc3545';
        img.style.fontSize = '14px';
        img.style.fontWeight = 'bold';

        img.alt = 'Failed to load screenshot';
        img.innerHTML = '<span>❌ Failed to load</span>';
    }

    // Обработчик клика по изображению
    function handleImageClick(e) {
        e.preventDefault();
        e.stopPropagation();

        const img = this;
        const index = parseInt(img.getAttribute('data-gallery-index')) || 0;

        console.log(`🎯 Click on image ${index}`);
        openGalleryModal(index);
    }

    // Инициализация модального окна
    function initModal() {
        const modalEl = document.getElementById('screenshotModal');

        if (!modalEl) {
            console.error('❌ Modal window element not found');
            return;
        }

        // Создаем экземпляр модального окна
        modalInstance = new bootstrap.Modal(modalEl, {
            backdrop: true,
            keyboard: true,
            focus: true
        });

        console.log('✅ Modal instance created');
    }

    // Открытие модального окна
    function openGalleryModal(imageIndex) {
        console.log(`📂 Opening modal for image ${imageIndex}`);

        // Проверяем границы
        currentImageIndex = Math.max(0, Math.min(imageIndex, galleryImages.length - 1));

        // Обновляем содержимое модального окна
        updateModalContent();

        // Открываем модальное окно
        if (modalInstance) {
            modalInstance.show();
            console.log('✅ Modal window opened');
        }
    }

    // Обновление содержимого модального окна (БЕЗ РАМОК)
    function updateModalContent() {
        const currentNumEl = document.getElementById('currentNum');
        const totalCountEl = document.getElementById('totalCount');
        const modalImg = document.getElementById('modalImage');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        if (!modalImg || galleryImages.length === 0) return;

        // Получаем текущее изображение
        const currentImage = galleryImages[currentImageIndex];
        const imageUrl = currentImage.getAttribute('data-image') || currentImage.src;

        console.log(`🔄 Loading modal image ${currentImageIndex + 1}/${galleryImages.length}`);

        // Очищаем предыдущие обработчики
        modalImg.onload = null;
        modalImg.onerror = null;

        // Новый обработчик загрузки (БЕЗ РАМОК)
        modalImg.onload = function() {
            console.log(`✅ Modal image loaded: ${this.naturalWidth}x${this.naturalHeight}`);

            // Для модального окна показываем оригинальный размер
            if (this.naturalWidth < 1000 || this.naturalHeight < 700) {
                // Маленькое изображение в модальном окне - масштабируем
                const scaleFactor = Math.min(2.5, 1000 / this.naturalWidth, 700 / this.naturalHeight);
                this.style.width = `${this.naturalWidth * scaleFactor}px`;
                this.style.height = `${this.naturalHeight * scaleFactor}px`;
                this.style.objectFit = 'scale-down';
                // УБРАЛИ фон и рамки
            } else {
                // Нормальное изображение
                this.style.maxWidth = '90vw';
                this.style.maxHeight = '85vh';
                this.style.objectFit = 'contain';
            }

            this.style.display = 'block';
            this.style.margin = 'auto';
        };

        modalImg.onerror = function() {
            console.error('❌ Failed to load modal image');
            this.style.backgroundColor = '#2a2a2a';
            this.style.display = 'flex';
            this.style.alignItems = 'center';
            this.style.justifyContent = 'center';
            this.style.color = '#fff';
            this.style.padding = '40px';
            this.style.borderRadius = '8px';
            this.innerHTML = '<div style="text-align: center;"><i class="bi bi-image" style="font-size: 2rem; color: #dc3545;"></i><br><span style="color: #dc3545; font-weight: bold;">Failed to load image</span></div>';
        };

        // Устанавливаем источник изображения
        modalImg.src = imageUrl;
        modalImg.alt = currentImage.alt || `Screenshot ${currentImageIndex + 1}`;

        // Обновляем счетчик
        if (currentNumEl) currentNumEl.textContent = currentImageIndex + 1;
        if (totalCountEl && (!totalCountEl.textContent || totalCountEl.textContent === ' / 0')) {
            totalCountEl.textContent = ` / ${galleryImages.length}`;
        }

        // Обновляем кнопки навигации
        updateNavigationButtons();
    }

    // Обновление кнопок навигации
    function updateNavigationButtons() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        if (prevBtn) {
            prevBtn.disabled = currentImageIndex === 0;
            prevBtn.style.opacity = prevBtn.disabled ? '0.3' : '1';
            prevBtn.style.cursor = prevBtn.disabled ? 'not-allowed' : 'pointer';
        }

        if (nextBtn) {
            nextBtn.disabled = currentImageIndex === galleryImages.length - 1;
            nextBtn.style.opacity = nextBtn.disabled ? '0.3' : '1';
            nextBtn.style.cursor = nextBtn.disabled ? 'not-allowed' : 'pointer';
        }
    }

    // Навигация
    function navigateGallery(direction) {
        if (direction === 'prev' && currentImageIndex > 0) {
            currentImageIndex--;
        } else if (direction === 'next' && currentImageIndex < galleryImages.length - 1) {
            currentImageIndex++;
        } else {
            return;
        }

        updateModalContent();
    }

    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🏠 Initializing gallery...');

        // Даем время для загрузки DOM
        setTimeout(() => {
            // Инициализируем галерею
            window.initInlineGallery();

            // Настраиваем кнопки навигации модального окна
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (prevBtn) {
                prevBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navigateGallery('prev');
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navigateGallery('next');
                });
            }

            // Клавиатурная навигация
            document.addEventListener('keydown', function(e) {
                const modal = document.getElementById('screenshotModal');
                if (modal && modal.classList.contains('show')) {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        navigateGallery('prev');
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        navigateGallery('next');
                    } else if (e.key === 'Escape') {
                        if (modalInstance) {
                            modalInstance.hide();
                        }
                    }
                }
            });

        }, 1000);
    });

    // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====

    // Увеличить все скриншоты еще больше
    window.increaseScreenshotSize = function(newHeight = 250) {
        console.log(`📈 Increasing screenshot height to ${newHeight}px`);

        galleryImages.forEach(img => {
            const container = img.closest('.screenshot-container-fixed');
            if (container) {
                container.style.height = `${newHeight}px`;

                if (img.complete) {
                    // Пересчитываем размер для нового контейнера
                    calculateAndSetImageSizeNoBorder(img, container);
                }
            }
        });
    };

    // Убрать все рамки и фоны
    window.removeAllBorders = function() {
        console.log('🚫 Removing all borders and backgrounds');

        galleryImages.forEach(img => {
            img.style.backgroundColor = 'transparent';
            img.style.border = 'none';
            img.style.padding = '0';

            const container = img.closest('.screenshot-container-fixed');
            if (container) {
                container.style.backgroundColor = 'transparent';
            }
        });
    };

    // Проверка текущих настроек
    window.checkSettings = function() {
        console.log('⚙️ Current gallery settings:');
        console.log(`  Fixed height: ${FIXED_HEIGHT}px`);
        console.log(`  Min width: ${MIN_WIDTH}px`);
        console.log(`  Max scale: ${MAX_SCALE}x`);
        console.log(`  Images: ${galleryImages.length}`);
    };

    console.log('✅ Gallery script ready (NO BORDERS)');
    console.log('💡 Команды:');
    console.log('  increaseScreenshotSize(250) - увеличить высоту скриншотов');
    console.log('  removeAllBorders() - убрать все рамки и фоны');
    console.log('  checkSettings() - проверить текущие настройки');
</script>
