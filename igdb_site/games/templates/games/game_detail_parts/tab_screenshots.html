{% load game_tags %}

<div class="tab-pane fade" id="screenshots" role="tabpanel" aria-labelledby="screenshots-tab">
    {% if game.screenshots.all %}
        <div class="screenshots-gallery">
            <div class="row g-3">
                {% for screenshot in game.screenshots.all %}
                    <div class="col-md-6 col-lg-4 col-xl-3">
                        <div class="screenshot-card card h-100 border-0">
                            <div class="position-relative overflow-hidden rounded screenshot-container">
                                <img src="{{ screenshot.image_url }}"
                                     class="card-img-top screenshot-image gallery-img w-100 h-100"
                                     alt="{{ game.name }} - Screenshot {{ forloop.counter }}"
                                     data-image="{{ screenshot.image_url }}"
                                     style="object-fit: cover; cursor: pointer;">
                                <div class="hover-overlay position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-0">
                                    <div class="position-absolute top-50 start-50 translate-middle">
                                        <i class="bi bi-zoom-in text-light fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>

        <!-- Модальное окно -->
        <div class="modal fade" id="screenshotModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content border-0">
                    <!-- Кнопка закрытия - ПРАВЫЙ ВЕРХНИЙ УГОЛ -->
                    <button type="button"
                            class="btn nav-arrow arrow-close position-fixed"
                            data-bs-dismiss="modal"
                            aria-label="Close">
                        <i class="bi bi-x-lg"></i>
                    </button>

                    <div class="modal-body p-0">
                        <!-- Левая стрелка -->
                        <button class="btn nav-arrow arrow-left"
                                id="prevBtn"
                                aria-label="Previous">
                            <i class="bi bi-chevron-left"></i>
                        </button>

                        <!-- Изображение -->
                        <div class="screenshot-viewer d-flex justify-content-center align-items-center w-100 h-100">
                            <img id="modalImage"
                                 src=""
                                 class="img-fluid screenshot-full"
                                 alt="">
                        </div>

                        <!-- Правая стрелка -->
                        <button class="btn nav-arrow arrow-right"
                                id="nextBtn"
                                aria-label="Next">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>

                    <!-- Счетчик - ВНИЗУ ПО ЦЕНТРУ -->
                    <div class="modal-footer border-0 position-fixed screenshot-counter">
                        <div class="text-light fw-bold" id="screenshotCounter">
                            <span id="currentNum">1</span><span id="totalCount"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    {% else %}
        <div class="game-detail-card card">
            <div class="card-body text-center py-5">
                <div class="mb-3">
                    <i class="bi bi-image text-muted" style="font-size: 3rem;"></i>
                </div>
                <h5 class="text-muted mb-2">No Screenshots Available</h5>
                <p class="text-muted mb-0">
                    Screenshots for this game haven't been loaded yet.
                </p>
            </div>
        </div>
    {% endif %}

    <!-- ПОДКЛЮЧЕНИЕ INLINE-СКРИПТА ГАЛЕРЕИ -->
    {% include 'games/game_detail_parts/gallery_script.html' %}
</div>
