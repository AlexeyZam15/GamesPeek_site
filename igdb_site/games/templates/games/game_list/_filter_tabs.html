<!-- games/templates/games/game_list/_filter_tabs.html -->
<!-- Вкладки для переключения между Search Filters и Similarity Filters -->

<!-- Контейнер для вкладок -->
<div class="filter-tabs-container mb-3">
    <ul class="nav nav-tabs card-header-tabs" id="filterTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="search-filters-tab" data-bs-toggle="tab"
                    data-bs-target="#search-filters-pane" type="button" role="tab" aria-controls="search-filters-pane"
                    aria-selected="true">
                🔍 Search Filters
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="similarity-filters-tab" data-bs-toggle="tab"
                    data-bs-target="#similarity-filters-pane" type="button" role="tab"
                    aria-controls="similarity-filters-pane" aria-selected="false">
                🎯 Similarity Filters
            </button>
        </li>
    </ul>
</div>

<!-- Контейнеры для содержимого вкладок -->
<div class="tab-content" id="filterTabContent">
    <!-- Панель Search Filters -->
    <div class="tab-pane fade show active" id="search-filters-pane" role="tabpanel"
         aria-labelledby="search-filters-tab">
        <!-- Подключаем существующий файл с поисковыми фильтрами -->
        {% include 'games/game_list/_search_filters.html' %}
    </div>

    <!-- Панель Similarity Filters -->
    <div class="tab-pane fade" id="similarity-filters-pane" role="tabpanel" aria-labelledby="similarity-filters-tab">
        <!-- Подключаем существующий файл с фильтрами похожести -->
        {% include 'games/game_list/_similarity_filters.html' %}
    </div>
</div>
