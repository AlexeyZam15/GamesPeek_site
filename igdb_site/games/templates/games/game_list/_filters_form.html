<!-- games/templates/games/game_list/_filters_form.html -->
<!-- ЗАГЛУШКА (точная копия видимой части) -->
{% include 'games/game_list/_filters_skeleton.html' %}

<!-- НАСТОЯЩИЕ ФИЛЬТРЫ (скрыты при загрузке) -->
<div class="card mb-4" id="real-filters-container" style="display: none;">
    <div class="card-body">
        <form method="get" id="main-search-form">
            <!-- Скрытые параметры - читаем НАПРЯМУЮ ИЗ REQUEST.GET -->
            <input type="hidden" name="find_similar" id="find_similar_field"
                   value="{% if find_similar %}1{% else %}0{% endif %}">
            <input type="hidden" name="source_game" value="{{ request.GET.source_game|default:'' }}">
            <input type="hidden" name="g" value="{{ request.GET.g|default:'' }}">
            <input type="hidden" name="k" value="{{ request.GET.k|default:'' }}">
            <input type="hidden" name="p" value="{{ request.GET.p|default:'' }}">
            <input type="hidden" name="t" value="{{ request.GET.t|default:'' }}">
            <input type="hidden" name="pp" value="{{ request.GET.pp|default:'' }}">
            <input type="hidden" name="gm" value="{{ request.GET.gm|default:'' }}">
            <input type="hidden" name="gt" value="{{ request.GET.gt|default:'' }}">
            <input type="hidden" name="e" value="{{ request.GET.e|default:'' }}">
            <input type="hidden" name="yr" id="year-range-field" value="{{ request.GET.yr|default:'' }}">
            <input type="hidden" name="ys" id="year-start-field" value="{{ request.GET.ys|default:'' }}">
            <input type="hidden" name="ye" id="year-end-field" value="{{ request.GET.ye|default:'' }}">

            <div class="row g-3">
                <!-- Встроенная сортировка -->
                {% include 'games/game_list/_sort_form.html' %}

                <!-- ===== ВКЛАДКИ (чистый CSS, без Bootstrap JS) ===== -->
                <div class="filter-tabs-container mb-3">
                    <div class="filter-tabs" id="filterTabs">
                        <div class="filter-tab-item">
                            <a href="#" class="filter-tab-link active" data-tab="search-filters-pane">
                                🔍 Search Filters
                            </a>
                        </div>
                        <div class="filter-tab-item">
                            <a href="#" class="filter-tab-link" data-tab="similarity-filters-pane">
                                🎯 Similarity Filters
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Контейнеры для содержимого вкладок (ОБА ЗАГРУЖЕНЫ) -->
                <div class="filter-tab-content">
                    <!-- Панель Search Filters (активная по умолчанию) -->
                    <div class="filter-tab-pane active" id="search-filters-pane">
                        {% include 'games/game_list/_search_filters.html' %}
                    </div>

                    <!-- Панель Similarity Filters (скрыта, но HTML загружен) -->
                    <div class="filter-tab-pane" id="similarity-filters-pane">
                        {% include 'games/game_list/_similarity_filters.html' %}
                    </div>
                </div>

                <!-- Основные кнопки -->
                <div class="col-12">
                    <div class="d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-primary apply-filters-main">
                            <i class="bi bi-funnel me-1"></i> Apply Filters
                        </button>
                        <a href="{% url 'game_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-clockwise me-1"></i> Show All Games
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- JavaScript логика -->
<script>
    window.minYear = {{ years_range.min_year }};
    window.maxYear = {{ years_range.max_year }};
    window.currentYear = {{ current_year }};
</script>

<!-- Простой JS для переключения вкладок (без Bootstrap) -->
<script>
    (function() {
        // Переключение вкладок через делегирование событий
        document.addEventListener('click', function(e) {
            const tabLink = e.target.closest('.filter-tab-link');
            if (!tabLink) return;

            e.preventDefault();

            const tabId = tabLink.dataset.tab;
            if (!tabId) return;

            // Деактивируем все вкладки
            document.querySelectorAll('.filter-tab-link').forEach(link => {
                link.classList.remove('active');
            });

            // Активируем текущую вкладку
            tabLink.classList.add('active');

            // Деактивируем все панели
            document.querySelectorAll('.filter-tab-pane').forEach(pane => {
                pane.classList.remove('active');
            });

            // Активируем нужную панель
            const targetPane = document.getElementById(tabId);
            if (targetPane) {
                targetPane.classList.add('active');
            }

            // Сохраняем в localStorage
            try {
                localStorage.setItem('activeFilterTab', tabId);
            } catch (e) {}
        });

        // Восстанавливаем последнюю активную вкладку
        try {
            const activeTabId = localStorage.getItem('activeFilterTab');
            if (activeTabId) {
                const tabToActivate = document.querySelector(`.filter-tab-link[data-tab="${activeTabId}"]`);
                if (tabToActivate) {
                    // Деактивируем все
                    document.querySelectorAll('.filter-tab-link').forEach(link => {
                        link.classList.remove('active');
                    });
                    document.querySelectorAll('.filter-tab-pane').forEach(pane => {
                        pane.classList.remove('active');
                    });

                    // Активируем сохраненную вкладку
                    tabToActivate.classList.add('active');
                    const targetPane = document.getElementById(activeTabId);
                    if (targetPane) {
                        targetPane.classList.add('active');
                    }
                }
            }
        } catch (e) {}
    })();
</script>

<script type="module" src="/static/games/js/game_list/filters-init.js"></script>
