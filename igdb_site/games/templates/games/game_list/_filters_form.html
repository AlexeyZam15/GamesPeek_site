<!-- games/templates/games/game_list/_filters_form.html -->
<!-- ЗАГЛУШКА (точная копия видимой части) -->
{% include 'games/game_list/_filters_skeleton.html' %}

<!-- НАСТОЯЩИЕ ФИЛЬТРЫ (скрыты при загрузке) -->
<div class="card mb-4" id="real-filters-container" style="display: none;">
    <div class="card-body">
        <form method="get" id="main-search-form">
            <!-- Скрытые параметры -->
            <input type="hidden" name="find_similar" id="find_similar_field"
                   value="{% if find_similar %}1{% else %}0{% endif %}">
            <input type="hidden" name="g" id="genres-field" value="{{ selected_genres|join:',' }}">
            <input type="hidden" name="k" id="keywords-field" value="{{ selected_keywords|join:',' }}">
            <input type="hidden" name="p" id="platforms-field" value="{{ selected_platforms|join:',' }}">
            <input type="hidden" name="t" id="themes-field" value="{{ selected_themes|join:',' }}">
            <input type="hidden" name="pp" id="perspectives-field" value="{{ selected_perspectives|join:',' }}">
            <input type="hidden" name="gm" id="game-modes-field" value="{{ selected_game_modes|join:',' }}">
            <input type="hidden" name="gt" id="game-types-field" value="{{ selected_game_types|join:',' }}">
            <input type="hidden" name="e" id="engines-field" value="{{ selected_engines|join:',' }}">
            <input type="hidden" name="yr" id="year-range-field" value="">
            <input type="hidden" name="ys" id="year-start-field" value="{{ selected_release_year_start|default:'' }}">
            <input type="hidden" name="ye" id="year-end-field" value="{{ selected_release_year_end|default:'' }}">

            <div class="row g-3">
                <!-- Встроенная сортировка -->
                {% include 'games/game_list/_sort_form.html' %}

                <!-- ===== НОВЫЙ БЛОК С ВКЛАДКАМИ ===== -->
                {% include 'games/game_list/_filter_tabs.html' %}
                <!-- ================================ -->

                <!-- Основные кнопки -->
                <div class="col-12">
                    <div class="d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-primary apply-filters-main">
                            <i class="bi bi-funnel me-1"></i> Apply Filters
                        </button>
                        <a href="{% url 'game_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-clockwise me-1"></i> Show All Games
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- JavaScript логика -->
<script>
    window.minYear = {{ years_range.min_year }};
    window.maxYear = {{ years_range.max_year }};
    window.currentYear = {{ current_year }};
</script>

<script type="module" src="/static/games/js/game_list/filters-init.js"></script>
