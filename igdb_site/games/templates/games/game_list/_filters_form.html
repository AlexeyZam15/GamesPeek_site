<!-- games/templates/games/game_list/_filters_form.html -->

<!-- Контейнер для фильтров - сначала заглушка, потом заменится на реальные фильтры -->
<div id="filters-container">
    <!-- Заглушка (скелетон) -->
    <div class="card mb-4" id="filters-skeleton">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12">
                    <div class="sorting-section border-bottom pb-3 mb-3">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                <div class="skeleton-label">Sort by:</div>
                            </div>
                            <div class="col-md-6">
                                <div class="skeleton-select"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="skeleton-button-apply">Apply Sort</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="filter-tabs-container mb-3">
                        <ul class="nav nav-tabs" id="skeleton-filter-tab" role="tablist">
                            <li class="nav-item" role="presentation" style="flex: 1;">
                                <div class="skeleton-tab">
                                    <i class="bi bi-search skeleton-icon me-2"></i>
                                    <span class="skeleton-text">Search Filters</span>
                                </div>
                            </li>
                            <li class="nav-item" role="presentation" style="flex: 1;">
                                <div class="skeleton-tab">
                                    <i class="bi bi-stars skeleton-icon me-2"></i>
                                    <span class="skeleton-text">Similarity Filters</span>
                                </div>
                            </li>
                        </ul>
                    </div>

                    <div class="skeleton-blurred-text">
                        <i class="bi bi-chevron-right skeleton-icon me-2"></i>
                        <span class="skeleton-text" style="width: 200px;">🔍 Search Filters</span>
                    </div>
                </div>

                <div class="col-12 mt-3">
                    <div class="d-flex gap-2 flex-wrap">
                        <div class="skeleton-button-primary">Apply Filters</div>
                        <div class="skeleton-button-secondary">Show All Games</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        function loadFilters() {
            console.log('Loading filters via AJAX...');

            const filtersContainer = document.getElementById('filters-container');
            if (!filtersContainer) return;

            const ajaxUrl = '/ajax/load-filters/' + window.location.search;

            fetch(ajaxUrl, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'text/html'
                },
                credentials: 'same-origin'
            })
            .then(response => {
                if (!response.ok) throw new Error('HTTP error ' + response.status);
                return response.text();
            })
            .then(html => {
                filtersContainer.innerHTML = html;
                console.log('Filters loaded successfully');

                setTimeout(() => {
                    if (window.FilterManager && typeof window.FilterManager.init === 'function') {
                        window.FilterManager.init();
                    }
                    if (window.KeywordsPagination && typeof window.KeywordsPagination.init === 'function') {
                        window.KeywordsPagination.init();
                    }
                }, 100);
            })
            .catch(error => {
                console.error('Error loading filters:', error);
                const skeleton = document.getElementById('filters-skeleton');
                if (skeleton) {
                    skeleton.innerHTML = '<div class="alert alert-danger m-3">Error loading filters. Please refresh the page.</div>';
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadFilters);
        } else {
            loadFilters();
        }
    })();
</script>
