<!-- games/templates/games/analyze/header.html -->
{% load static %}

<!-- Заголовок -->
<div class="analyze-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h1>
                <i class="bi bi-search text-warning me-2"></i>
                Analyze: <a href="{% url 'game_detail' game.id %}" class="game-link">{{ game.name }}</a>
            </h1>
            <p class="text-muted mb-0">
                <i class="bi bi-info-circle me-1"></i>
                Analyze game descriptions and extract criteria/keywords with automatic highlighting
            </p>
        </div>
        <div>
            <span class="badge bg-secondary">
                <i class="bi bi-calendar me-1"></i>
                Last analyzed: {% if game.last_analyzed_date %}
                {{ game.last_analyzed_date|date:"M d, Y" }}{% else %}Never{% endif %}
            </span>
        </div>
    </div>
</div>
