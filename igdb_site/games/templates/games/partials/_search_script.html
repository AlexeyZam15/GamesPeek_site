<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('main-search-form');

    // Элементы поиска
    const genreSearch = document.getElementById('genre-search');
    const keywordSearch = document.getElementById('keyword-search');

    // Списки элементов
    const genreItems = document.querySelectorAll('.genre-item');
    const keywordItems = document.querySelectorAll('.keyword-item');

    // Функция для фильтрации списка в колонках
    function filterList(items, searchTerm) {
        const term = searchTerm.toLowerCase().trim();

        items.forEach(item => {
            const itemName = item.getAttribute('data-genre-name') || item.getAttribute('data-keyword-name');
            const isVisible = itemName.includes(term);

            item.style.display = isVisible ? 'block' : 'none';
        });
    }

    // Поиск по жанрам
    if (genreSearch) {
        genreSearch.addEventListener('input', function() {
            filterList(genreItems, this.value);
        });
    }

    // Поиск по ключевым словам
    if (keywordSearch) {
        keywordSearch.addEventListener('input', function() {
            filterList(keywordItems, this.value);
        });
    }

    // Удаление активных тегов (ТОЛЬКО пользовательских)
    function setupActiveTagRemoval() {
        // Удаление активных жанров (только пользовательских)
        document.querySelectorAll('.active-genre-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const genreId = this.getAttribute('data-genre-id');

                // Находим и снимаем чекбокс
                const checkbox = document.querySelector(`input.genre-checkbox[value="${genreId}"]`);
                if (checkbox) {
                    checkbox.checked = false;
                }

                // Удаляем тег
                this.remove();

                // Отправляем форму
                form.submit();
            });
        });

        // Удаление активных ключевых слов (только пользовательских)
        document.querySelectorAll('.active-keyword-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const keywordId = this.getAttribute('data-keyword-id');

                // Находим и снимаем чекбокс
                const checkbox = document.querySelector(`input.keyword-checkbox[value="${keywordId}"]`);
                if (checkbox) {
                    checkbox.checked = false;
                }

                // Удаляем тег
                this.remove();

                // Отправляем форму
                form.submit();
            });
        });
    }

    // Авто-отправка формы при изменении чекбоксов
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            form.submit();
        });
    });

    // Авто-отправка формы при изменении сортировки
    const sortSelect = document.querySelector('select[name="sort"]');
    if (sortSelect) {
        sortSelect.addEventListener('change', function() {
            form.submit();
        });
    }

    // Инициализация
    setupActiveTagRemoval();

    // Скрываем неактивные элементы при загрузке
    if (genreSearch && genreSearch.value) {
        filterList(genreItems, genreSearch.value);
    }
    if (keywordSearch && keywordSearch.value) {
        filterList(keywordItems, keywordSearch.value);
    }
});
</script>
