<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('main-search-form');
        console.log('Search script initialized');

        // Элементы поиска для ВСЕХ фильтров
        const genreSearch = document.getElementById('genre-search');
        const keywordSearch = document.getElementById('keyword-search');
        const platformSearch = document.getElementById('platform-search');
        const themeSearch = document.getElementById('theme-search');
        const perspectiveSearch = document.getElementById('perspective-search');
        const developerSearch = document.getElementById('developer-search');

        // Элементы списков
        const genreList = document.querySelector('.genre-list');
        const keywordList = document.querySelector('.keyword-list');
        const platformList = document.querySelector('.platform-list');
        const themeList = document.querySelector('.theme-list');
        const perspectiveList = document.querySelector('.perspective-list');
        const developerList = document.querySelector('.developer-list');

        // Кнопки "Show all"
        const showAllGenresBtn = document.querySelector('.show-all-genres-btn');
        const showAllKeywordsBtn = document.querySelector('.show-all-keywords-btn');
        const showAllPlatformsBtn = document.querySelector('.show-all-platforms-btn');
        const showAllThemesBtn = document.querySelector('.show-all-themes-btn');
        const showAllPerspectivesBtn = document.querySelector('.show-all-perspectives-btn');
        const showAllDevelopersBtn = document.querySelector('.show-all-developers-btn');

        // Функция для фильтрации списков
        function filterList(searchInput, itemSelector, nameAttribute) {
            if (!searchInput) return;

            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                const items = document.querySelectorAll(itemSelector);

                items.forEach(item => {
                    const itemName = item.getAttribute(nameAttribute).toLowerCase();
                    const isMatch = itemName.includes(searchTerm);
                    item.style.display = isMatch ? 'block' : 'none';
                });
            });

            // Обработчик для очистки поля
            searchInput.addEventListener('search', function() {
                if (this.value === '') {
                    this.dispatchEvent(new Event('input'));
                }
            });
        }

        // Функция для переключения отображения полного списка
        function setupShowAllToggle(showAllBtn, listElement, defaultHeight = '200px', expandedHeight = '400px') {
            if (!showAllBtn || !listElement) return;

            let isExpanded = false;

            showAllBtn.addEventListener('click', function() {
                isExpanded = !isExpanded;

                if (isExpanded) {
                    listElement.style.maxHeight = expandedHeight;
                    showAllBtn.querySelector('.show-text').style.display = 'none';
                    showAllBtn.querySelector('.hide-text').style.display = 'inline';
                } else {
                    listElement.style.maxHeight = defaultHeight;
                    showAllBtn.querySelector('.show-text').style.display = 'inline';
                    showAllBtn.querySelector('.hide-text').style.display = 'none';
                }
            });
        }

        // Удаление активных тегов для ВСЕХ фильтров
        function setupActiveTagRemoval() {
            // Жанры
            document.querySelectorAll('.active-genre-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const genreId = this.getAttribute('data-genre-id');
                    const checkbox = document.querySelector(`.genre-checkbox[value="${genreId}"]`);
                    if (checkbox) {
                        checkbox.checked = false;
                    }
                    updateHiddenFields();
                    form.submit();
                });
            });

            // Ключевые слова
            document.querySelectorAll('.active-keyword-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const keywordId = this.getAttribute('data-keyword-id');
                    const checkbox = document.querySelector(`.keyword-checkbox[value="${keywordId}"]`);
                    if (checkbox) {
                        checkbox.checked = false;
                    }
                    updateHiddenFields();
                    form.submit();
                });
            });

            // Платформы
            document.querySelectorAll('.active-platform-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const platformId = this.getAttribute('data-platform-id');
                    const checkbox = document.querySelector(`.platform-checkbox[value="${platformId}"]`);
                    if (checkbox) {
                        checkbox.checked = false;
                    }
                    updateHiddenFields();
                    form.submit();
                });
            });

            // Темы
            document.querySelectorAll('.active-theme-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const themeId = this.getAttribute('data-theme-id');
                    const checkbox = document.querySelector(`.theme-checkbox[value="${themeId}"]`);
                    if (checkbox) {
                        checkbox.checked = false;
                    }
                    updateHiddenFields();
                    form.submit();
                });
            });

            // Перспективы
            document.querySelectorAll('.active-perspective-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const perspectiveId = this.getAttribute('data-perspective-id');
                    const checkbox = document.querySelector(`.perspective-checkbox[value="${perspectiveId}"]`);
                    if (checkbox) {
                        checkbox.checked = false;
                    }
                    updateHiddenFields();
                    form.submit();
                });
            });

            // Разработчики
            document.querySelectorAll('.active-developer-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const developerId = this.getAttribute('data-developer-id');
                    const checkbox = document.querySelector(`.developer-checkbox[value="${developerId}"]`);
                    if (checkbox) {
                        checkbox.checked = false;
                    }
                    updateHiddenFields();
                    form.submit();
                });
            });
        }

        // Обновление скрытых полей
        function updateHiddenFields() {
            // Жанры
            const genreCheckboxes = document.querySelectorAll('.genre-checkbox:checked');
            const genreIds = Array.from(genreCheckboxes).map(cb => cb.value);
            document.getElementById('genres-field').value = genreIds.join(',');

            // Ключевые слова
            const keywordCheckboxes = document.querySelectorAll('.keyword-checkbox:checked');
            const keywordIds = Array.from(keywordCheckboxes).map(cb => cb.value);
            document.getElementById('keywords-field').value = keywordIds.join(',');

            // Платформы
            const platformCheckboxes = document.querySelectorAll('.platform-checkbox:checked');
            const platformIds = Array.from(platformCheckboxes).map(cb => cb.value);
            document.getElementById('platforms-field').value = platformIds.join(',');

            // Темы
            const themeCheckboxes = document.querySelectorAll('.theme-checkbox:checked');
            const themeIds = Array.from(themeCheckboxes).map(cb => cb.value);
            document.getElementById('themes-field').value = themeIds.join(',');

            // Перспективы
            const perspectiveCheckboxes = document.querySelectorAll('.perspective-checkbox:checked');
            const perspectiveIds = Array.from(perspectiveCheckboxes).map(cb => cb.value);
            document.getElementById('perspectives-field').value = perspectiveIds.join(',');

            // Разработчики
            const developerCheckboxes = document.querySelectorAll('.developer-checkbox:checked');
            const developerIds = Array.from(developerCheckboxes).map(cb => cb.value);
            document.getElementById('developers-field').value = developerIds.join(',');

            // Автоматически включаем режим похожих игр при выборе любых критериев похожести
            if (genreIds.length > 0 || keywordIds.length > 0 || themeIds.length > 0 ||
                perspectiveIds.length > 0 || developerIds.length > 0) {
                document.getElementById('find_similar_field').value = '1';
            } else {
                document.getElementById('find_similar_field').value = '0';
            }
        }

        // Авто-отправка формы для ВСЕХ чекбоксов
        function setupAutoSubmit() {
            // Для всех критериев похожести - включаем режим похожих игр
            document.querySelectorAll('.genre-checkbox, .keyword-checkbox, .theme-checkbox, .perspective-checkbox, .developer-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    document.getElementById('find_similar_field').value = '1';
                    form.submit();
                });
            });

            // Для платформ - НЕ включаем режим похожих игр, просто фильтруем
            document.querySelectorAll('.platform-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    // Не меняем find_similar_field, оставляем текущее значение
                    form.submit();
                });
            });

            const sortSelect = document.querySelector('select[name="sort"]');
            if (sortSelect) {
                sortSelect.addEventListener('change', function() {
                    form.submit();
                });
            }
        }

        // Инициализация всех функций
        function initializeAll() {
            // Фильтрация для всех списков
            filterList(genreSearch, '.genre-item', 'data-genre-name');
            filterList(keywordSearch, '.keyword-item', 'data-keyword-name');
            filterList(platformSearch, '.platform-item', 'data-platform-name');
            filterList(themeSearch, '.theme-item', 'data-theme-name');
            filterList(perspectiveSearch, '.perspective-item', 'data-perspective-name');
            filterList(developerSearch, '.developer-item', 'data-developer-name');

            // Показать/скрыть для всех списков
            setupShowAllToggle(showAllGenresBtn, genreList, '200px', '400px');
            setupShowAllToggle(showAllKeywordsBtn, keywordList, '200px', '400px');
            setupShowAllToggle(showAllPlatformsBtn, platformList, '200px', '400px');
            setupShowAllToggle(showAllThemesBtn, themeList, '200px', '400px');
            setupShowAllToggle(showAllPerspectivesBtn, perspectiveList, '200px', '400px');
            setupShowAllToggle(showAllDevelopersBtn, developerList, '200px', '400px');

            setupActiveTagRemoval();
            setupAutoSubmit();

            console.log('All search functionalities initialized');
        }

        setTimeout(initializeAll, 100);
    });
</script>
