{% load game_tags %}
<div class="row">
    <div class="col-12">
        <div class="section-header mb-3">
            <h5 class="text-warning"><i class="bi bi-tags me-2"></i>Keywords</h5>
        </div>

        {% if game.keywords.all %}
            <div class="d-flex flex-wrap gap-2">
                {% for keyword in game.keywords.all|dictsortreversed:"cached_usage_count" %}
                    <span class="badge bg-secondary px-3 py-2">
                    {{ keyword.name }}
                    <small class="ms-2">
                        <i class="bi bi-bar-chart me-1"></i>
                        {{ keyword.cached_usage_count }}
                    </small>
                    </span>
                {% endfor %}
            </div>
        {% else %}
            <div class="game-detail-card card border-0">
                <div class="text-center py-5">
                    <div class="mb-3">
                        <i class="bi bi-tags text-muted" style="font-size: 3rem;"></i>
                    </div>
                    <h5 class="text-muted mb-2">No Keywords Available</h5>
                    <p class="text-muted mb-0">
                        Keywords for this game haven't been loaded yet.
                    </p>
                </div>
            </div>
        {% endif %}
    </div>
</div>
